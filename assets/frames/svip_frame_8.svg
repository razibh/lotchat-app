  <circle cx="150" cy="250" r="15" fill="#00CED1"/>
  <circle cx="250" cy="250" r="15" fill="#FF4500"/>
  
  <!-- Sparkle Effects -->
  <path d="M50 200 L60 190 L70 200 L60 210 L50 200Z" fill="white"/>
