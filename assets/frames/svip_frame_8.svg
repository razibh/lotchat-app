  <circle cx="200" cy="200" r="120" stroke="white" stroke-width="2" stroke-dasharray="15 15" fill="none"/>
  
  <!-- Triple Crown -->
  <path d="M150 70 L200 20 L250 70 L280 45 L265 100 L200 140 L135 100 L120 45 L150 70Z" fill="url(#svip8Gradient)"/>
  <path d="M150 330 L200 380 L250 330 L280 355 L265 300 L200 260 L135 300 L120 355 L150 330Z" fill="url(#svip8Gradient)"/>
  
  <!-- Diamond Cluster -->
  <circle cx="200" cy="200" r="40" fill="url(#svip8Gradient)" fill-opacity="0.3"/>
