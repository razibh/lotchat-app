<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Loading Circle -->
  <circle cx="150" cy="150" r="40" stroke="#E5E7EB" stroke-width="8"/>
  <path d="M150 110 A40 40 0 0 1 190 150" stroke="url(#loadingGradient)" stroke-width="8" stroke-linecap="round">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 150 150"
      to="360 150 150"
      dur="1s"
      repeatCount="indefinite"/>
  </path>
  
  <!-- Text -->
  <text x="150" y="230" font-size="18" font-weight="bold" text-anchor="middle" fill="#8B5CF6">Loading</text>
  <text x="150" y="255" font-size="14" text-anchor="middle" fill="#8B5CF6">Please wait...</text>
  
  <defs>
    <linearGradient id="loadingGradient" x1="110" y1="110" x2="190" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
  </defs>
</svg>