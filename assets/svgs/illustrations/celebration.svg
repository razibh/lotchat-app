<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Party Popper -->
  <path d="M100 180 L120 150 L140 180 L120 210 L100 180Z" fill="#FFD700" fill-opacity="0.3" stroke="#FFD700" stroke-width="2"/>
  
  <!-- Confetti -->
  <circle cx="180" cy="120" r="4" fill="#FF69B4">
    <animate attributeName="cy" from="120" to="180" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="140" r="3" fill="#8B5CF6">
    <animate attributeName="cy" from="140" to="200" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="160" r="2" fill="#F59E0B">
    <animate attributeName="cy" from="160" to="220" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Text -->
  <text x="150" y="250" font-size="24" font-weight="bold" text-anchor="middle" fill="url(#celebrationGradient)">Hurray!</text>
  
  <defs>
    <linearGradient id="celebrationGradient" x1="100" y1="230" x2="200" y2="270" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
  </defs>
</svg>