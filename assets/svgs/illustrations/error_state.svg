<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Error Circle -->
  <circle cx="150" cy="150" r="50" fill="#FEE2E2" stroke="#EF4444" stroke-width="3"/>
  
  <!-- X Mark -->
  <line x1="125" y1="125" x2="175" y2="175" stroke="#EF4444" stroke-width="4" stroke-linecap="round"/>
  <line x1="175" y1="125" x2="125" y2="175" stroke="#EF4444" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Exclamation -->
  <circle cx="150" cy="190" r="3" fill="#EF4444"/>
  <rect x="148" y="165" width="4" height="15" rx="2" fill="#EF4444"/>
  
  <!-- Text -->
  <text x="150" y="230" font-size="18" font-weight="bold" text-anchor="middle" fill="#EF4444">Oops!</text>
  <text x="150" y="255" font-size="14" text-anchor="middle" fill="#EF4444">Something went wrong</text>
</svg>