<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="150" cy="150" r="120" fill="#8B5CF6" fill-opacity="0.05"/>
  
  <!-- Users Group -->
  <circle cx="100" cy="140" r="25" fill="#8B5CF6" fill-opacity="0.2"/>
  <circle cx="200" cy="140" r="25" fill="#EC4899" fill-opacity="0.2"/>
  <circle cx="150" cy="180" r="25" fill="#F59E0B" fill-opacity="0.2"/>
  
  <!-- Faces -->
  <circle cx="100" cy="135" r="3" fill="black"/>
  <circle cx="200" cy="135" r="3" fill="black"/>
  <circle cx="150" cy="175" r="3" fill="black"/>
  
  <!-- Connection Lines -->
  <line x1="125" y1="145" x2="175" y2="145" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="4 4"/>
  <line x1="125" y1="165" x2="175" y2="165" stroke="#EC4899" stroke-width="2" stroke-dasharray="4 4"/>
  
  <!-- Title -->
  <text x="150" y="250" font-size="20" font-weight="bold" text-anchor="middle" fill="#8B5CF6">Connect with</text>
  <text x="150" y="280" font-size="20" font-weight="bold" text-anchor="middle" fill="#EC4899">Friends</text>
  
  <!-- Decorative Dots -->
  <circle cx="80" cy="80" r="4" fill="#8B5CF6" fill-opacity="0.3"/>
  <circle cx="220" cy="100" r="4" fill="#EC4899" fill-opacity="0.3"/>
  <circle cx="250" cy="220" r="4" fill="#F59E0B" fill-opacity="0.3"/>
</svg>