<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Level Bar -->
  <rect x="90" y="160" width="120" height="20" rx="10" fill="#E5E7EB"/>
  <rect x="90" y="160" width="100" height="20" rx="10" fill="url(#levelGradient)">
    <animate attributeName="width" from="0" to="100" dur="1s" fill="freeze"/>
  </rect>
  
  <!-- Up Arrow -->
  <path d="M150 100 L165 130 L135 130 L150 100Z" fill="#10B981"/>
  <rect x="145" y="130" width="10" height="30" fill="#10B981"/>
  
  <!-- Text -->
  <text x="150" y="220" font-size="24" font-weight="bold" text-anchor="middle" fill="#10B981">Level Up!</text>
  <text x="150" y="250" font-size="14" text-anchor="middle" fill="#10B981">You're now Level 5</text>
  
  <defs>
    <linearGradient id="levelGradient" x1="90" y1="160" x2="210" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10B981"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
  </defs>
</svg>