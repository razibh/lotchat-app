
plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"  // Firebase Google Services plugin
    id "com.google.firebase.crashlytics"  // Firebase Crashlytics
    id "com.google.firebase.firebase-perf"  // Firebase Performance Monitoring
    id 'com.google.gms.google-services' version '4.4.4' apply false
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    // Compile SDK version
    compileSdkVersion 34
    
    // NDK version
    ndkVersion flutter.ndkVersion

    // Java compatibility
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    // Kotlin options
    kotlinOptions {
        jvmTarget = '1.8'
    }

    // Source sets
    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    // Default config
    defaultConfig {
        // TODO: আপনার package name দিন
        applicationId "com.razib.lotchat"
        
        // Minimum SDK version
        minSdkVersion 21
        
        // Target SDK version
        targetSdkVersion 34
        
        // Version code and name
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        
        // MultiDex enable
        multiDexEnabled true
        
        // Test instrumentation runner
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    // Build types
    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            signingConfig signingConfigs.debug
            
            // Code optimization
            minifyEnabled true
            shrinkResources true
            
            // ProGuard rules
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            
            // Firebase performance
            firebasePerformance {
                instrumentationEnabled false
            }
        }
        
        debug {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
            
            // Debug specific configurations
            debuggable true
            
            // Firebase performance for debug
            firebasePerformance {
                instrumentationEnabled false
            }
        }
        
        profile {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
            matchingFallbacks = ['debug']
        }
    }

    // Product flavors for different environments
    flavorDimensions "environment"
    
    productFlavors {
        dev {
            dimension "environment"
            applicationIdSuffix ".dev"
            versionNameSuffix "-dev"
            manifestPlaceholders = [appName: "LotChat Dev"]
            resValue "string", "app_name", "LotChat Dev"
        }
        
        staging {
            dimension "environment"
            applicationIdSuffix ".staging"
            versionNameSuffix "-staging"
            manifestPlaceholders = [appName: "LotChat Staging"]
            resValue "string", "app_name", "LotChat Staging"
        }
        
        prod {
            dimension "environment"
            manifestPlaceholders = [appName: "LotChat"]
            resValue "string", "app_name", "LotChat"
        }
    }

    // Variant outputs
    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            def outputFileName = "LotChat-${variant.name}-${variant.versionName}.apk"
            output.outputFileName = outputFileName
        }
    }

    // Packaging options
    packagingOptions {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
        }
    }

    // Bundle configurations
    bundle {
        language {
            enableSplit = false
        }
        density {
            enableSplit = true
        }
        abi {
            enableSplit = true
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation 'com.android.support:appcompat-v7:28.0.0'
    implementation 'com.android.support:animated-vector-drawable:28.0.0'
    implementation 'androidx.core:core-ktx:1.12.0'
    // START: FlutterFire Configuration
        classpath 'com.google.gms:google-services:4.3.15'
        classpath 'com.google.firebase:firebase-crashlytics-gradle:2.8.1'
        // END: FlutterFire Configuration
    // Kotlin standard library
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    
    // MultiDex support
    implementation 'androidx.multidex:multidex:2.0.1'
    
    // AndroidX Core
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    // Material Design
    implementation 'com.google.android.material:material:1.10.0'
    
    // Constraint Layout
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    
    // Import the Firebase BoM (Bill of Materials)
    implementation platform('com.google.firebase:firebase-bom:32.7.0')
    
    // Firebase Analytics
    implementation 'com.google.firebase:firebase-analytics'
    
    // Firebase Authentication
    implementation 'com.google.firebase:firebase-auth'
    implementation 'com.google.android.gms:play-services-auth:20.7.0'
    
    // Cloud Firestore
    implementation 'com.google.firebase:firebase-firestore'
    
    // Firebase Storage
    implementation 'com.google.firebase:firebase-storage'
    
    // Firebase Cloud Messaging (Push Notifications)
    implementation 'com.google.firebase:firebase-messaging'
    
    // Firebase Crashlytics
    implementation 'com.google.firebase:firebase-crashlytics'
    
    // Firebase Performance Monitoring
    implementation 'com.google.firebase:firebase-perf'
    
    // Firebase Realtime Database (if needed)
    // implementation 'com.google.firebase:firebase-database'
    
    // Firebase Remote Config
    implementation 'com.google.firebase:firebase-config'
    // Import the Firebase BoM
  implementation platform('com.google.firebase:firebase-bom:34.10.0')


  // TODO: Add the dependencies for Firebase products you want to use
  // When using the BoM, don't specify versions in Firebase dependencies
  implementation 'com.google.firebase:firebase-analytics'


  // Add the dependencies for any other desired Firebase products
  // https://firebase.google.com/docs/android/setup#available-libraries
    // Firebase Dynamic Links
    // implementation 'com.google.firebase:firebase-dynamic-links'
    
    // Firebase In-App Messaging
    // implementation 'com.google.firebase:firebase-inappmessaging-display'
    
    // Firebase App Check
    // implementation 'com.google.firebase:firebase-appcheck'
    
    // FirebaseUI Auth (for easy authentication UI)
    implementation 'com.firebaseui:firebase-ui-auth:8.0.0'
    
    // Google Play Services
    implementation 'com.google.android.gms:play-services-base:18.2.0'
    implementation 'com.google.android.gms:play-services-tasks:18.0.2'
    
    // For using Facebook Login
    // implementation 'com.facebook.android:facebook-login:16.0.0'
    
    // For using Twitter Login
    // implementation 'com.twitter.sdk.android:twitter-core:3.3.0'
    
    // For using GitHub Login
    // implementation 'com.github.square:okhttp:4.11.0'
    
    // Testing dependencies
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test:runner:1.5.2'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
    
    // WorkManager (for background tasks)
    implementation 'androidx.work:work-runtime-ktx:2.9.0'
    
    // Lifecycle components
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0'
    
    // Coroutines
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-play-services:1.7.3'
}

// Firebase Crashlytics configuration
crashlytics {
    enableNdk true
    mappingFileUploadEnabled true
}

// Firebase Performance configuration
firebasePerformance {
    // Set this flag to 'false' to disable @AddTrace annotation processing and
    // automatic HTTP/S network request monitoring
    // for a specific build variant at compile time.
    instrumentationEnabled false
}

