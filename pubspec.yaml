name: lotchat_app
description: "LotChat: Voice Chat, PK Battle App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=2.19.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter


  # Core Packages
  cupertino_icons: ^1.0.6
  provider: ^6.0.5
  shared_preferences: ^2.2.0
  http: ^1.1.0
  intl: ^0.20.2
  equatable: ^2.0.5
  flutter_dotenv: ^6.0.0

  # Agora RTC Engine - latest stable version
  agora_rtc_engine: ^6.3.0
  # Translation & Speech
  flutter_tts: ^3.8.3
  speech_to_text: ^6.6.0


  # Firebase প্যাকেজ (এইগুলো যোগ করুন)
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.9
  firebase_analytics: ^10.8.0
  # UI & Design
  google_fonts: ^8.0.2
  lottie: ^3.3.2
  flutter_svg: ^2.0.7
  shimmer: ^3.0.0
  animations: ^2.0.10
  flutter_staggered_animations: ^1.1.0
  skeletonizer: ^2.1.3

  # Image & Media
  image_picker: ^1.0.4
  cached_network_image: ^3.2.3
  video_player: ^2.8.3
  chewie: ^1.7.4
  flutter_cache_manager: ^3.3.1

  # Navigation
  go_router: ^17.1.0
  flutter_localizations:
    sdk: flutter

  # Forms & Validation
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0

  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0

  # Database
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  dio: ^5.3.0
  socket_io_client: ^3.1.4
  connectivity_plus: ^7.0.0
  web_socket_channel: ^3.0.3

  # WebView
  webview_flutter: ^4.4.0
  webview_flutter_android: ^4.10.13
  webview_flutter_wkwebview: ^3.12.0

  # QR & Barcode
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # Charts & Analytics
  fl_chart: ^1.2.0
  syncfusion_flutter_charts: ^32.2.9

  # Payments
  razorpay_flutter: ^1.3.5
  stripe_payment: ^1.1.4
  flutter_stripe: ^12.4.0

  # Social & Sharing
  share_plus: ^12.0.1
  url_launcher: ^6.2.2

  # Permissions
  permission_handler: ^12.0.1
  # GetIt for dependency injection
  get_it: ^7.6.4
  # Utils
  device_info_plus: ^12.3.0
  package_info_plus: ^9.0.0
  clipboard: ^3.0.14
  vibration: ^3.1.8

  # Localization
  easy_localization: ^3.0.5

  # Pull to Refresh
  pull_to_refresh: ^2.0.0

  # In-App Purchase
  in_app_purchase: ^3.1.13

  # Notifications
  flutter_local_notifications: ^15.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Testing
  mockito: ^5.4.4
  build_runner: ^2.4.8
  bloc_test: ^10.0.0

  # Code Quality
  flutter_lints: ^6.0.0

  # Launcher Icons
  flutter_launcher_icons: ^0.14.4

  # Native Splash
  flutter_native_splash: ^2.3.8

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/animations/
      - assets/badges/
      - assets/effects/
      - assets/frames/
      - assets/gifts/cute/
      - assets/gifts/luxury/
      - assets/gifts/svip/
      - assets/gifts/vip/
      - assets/icons/animations/
      - assets/icons/badges/
      - assets/icons/categories/
      - assets/icons/gift_types/
     - assets/icons/ui/
      - assets/images/app
      - assets/images/avatars
     - assets/images/backgrounds
     - assets/images/badges
       - assets/images/emojis
      - assets/images/flags
      - assets/images/games
      - assets/images/icons
    - assets/images/onboarding
    - assets/images/placeholders
    - assets/images/rooms
    - assets/sounds
    - assets/svgs/emojis
    - assets/svgs/games
    - assets/svgs/icons
    - assets/svgs/illustrations
    - assets/svgs/logos
    - assets/svgs/navigation
    - assets/svgs/social
    - assets/svgs/ui
    - assets/svgs/wallet
  # Fonts
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Thin.ttf
          weight: 100
        - asset: assets/fonts/Poppins-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Poppins-Black.ttf
          weight: 900

    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Italic.ttf
          style: italic

    - family: Bangla
      fonts:
        - asset: assets/fonts/NotoSansBengali-Regular.ttf
        - asset: assets/fonts/NotoSansBengali-Bold.ttf
          weight: 700

    - family: Hindi
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Regular.ttf
        - asset: assets/fonts/NotoSansDevanagari-Bold.ttf
          weight: 700

    - family: Urdu
      fonts:
        - asset: assets/fonts/NotoNastaliqUrdu-Regular.ttf

# Launcher Icons Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#8B5CF6"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  remove_alpha_ios: true

# Native Splash Configuration
flutter_native_splash:
  color: "#8B5CF6"
  image: "assets/images/splash_logo.png"
  branding: "assets/images/branding.png"
  
  android_12:
    image: "assets/images/splash_logo.png"
    icon_background_color: "#8B5CF6"
    branding: "assets/images/branding.png"
  
  web: true
  ios: true
  android: true
  
  fullscreen: true

# Build Configuration
flutter_intl:
  enabled: true
  class_name: S
  main_locale: en
  arb_dir: lib/l10n