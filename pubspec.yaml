name: lotchat
description: "LotChat - Voice Chat, PK Battle App"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.10.7

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

#  anti_screenshot: ^1.0.5
  supabase_flutter: ^2.0.0


# Location packages
  geolocator: ^10.1.0
  geocoding: ^2.1.1


  provider: ^6.0.5
  shared_preferences: ^2.2.0
  http: ^1.1.0
  intl: ^0.20.2
  equatable: ^2.0.5
  flutter_dotenv: ^6.0.0


  # Agora RTC Engine - latest stable version
  agora_rtc_engine: ^6.3.0

  # Translation & Speech
  flutter_tts: ^3.8.3
  speech_to_text: ^7.3.0

  # Toast messages
  fluttertoast: ^8.2.4

  # Room screen dependencies
  audioplayers: ^6.6.0
  confetti: ^0.7.0

  # Google Sign-In
  google_sign_in: ^6.3.0

  # Web dependencies (required for Firebase Web)
  js: ^0.7.2

  # UI & Design
  google_fonts: ^8.0.2
  lottie: ^3.3.2
  flutter_svg: ^2.0.7
  shimmer: ^3.0.0
  animations: ^2.0.10
  flutter_staggered_animations: ^1.1.0
  skeletonizer: ^2.1.3

  # Image & Media
  image_picker: ^1.0.4

  cached_network_image: ^3.2.3
  video_player: ^2.8.3
  chewie: ^1.7.4
  flutter_cache_manager: ^3.3.1
  flutter_image_compress: ^2.1.0

  # Navigation
  go_router: ^17.1.0
  flutter_localizations:
    sdk: flutter

  # Forms & Validation
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0

  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0

  # Database
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  dio: ^5.3.0
  socket_io_client: ^3.1.4
  connectivity_plus: ^7.0.0
  web_socket_channel: ^3.0.3

  # WebView
  webview_flutter: ^4.4.0
  webview_flutter_android: ^4.10.13
  webview_flutter_wkwebview: ^3.12.0

  # QR & Barcode
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # Charts & Analytics
  fl_chart: ^1.2.0
  syncfusion_flutter_charts: ^32.2.9

  # Payments
  razorpay_flutter: ^1.4.1
  #  stripe_payment: ^1.1.4
  flutter_stripe: ^12.4.0

  # Social & Sharing
  share_plus: ^12.0.1
  url_launcher: ^6.2.4

  # Permissions
  permission_handler: ^11.0.0

  # GetIt for dependency injection
  get_it: ^7.6.4

  # Utils
  device_info_plus: ^12.3.0
  package_info_plus: ^9.0.0
  clipboard: ^3.0.14
  vibration: ^3.1.8

  # অন্যান্য ডিপেন্ডেন্সি
  flutter_secure_storage: ^10.0.0
  # Localization
  easy_localization: ^3.0.5

  # Pull to Refresh
  pull_to_refresh: ^2.0.0

  # In-App Purchase
  in_app_purchase: ^3.1.13

  # Notifications
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

  # Testing
  mockito: ^5.4.4
  build_runner: ^2.4.8
  bloc_test: ^10.0.0

  # Launcher Icons
  flutter_launcher_icons: ^0.14.4

  # Native Splash
  flutter_native_splash: ^2.3.8

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  assets:
    - assets/animations/
    - assets/badges/
    - assets/effects/
    - assets/frames/
    - assets/gifts/cute/
    - assets/gifts/luxury/
    - assets/gifts/svip/
    - assets/gifts/vip/
    - assets/icons/animations/
    - assets/icons/badges/
    - assets/icons/categories/
    - assets/icons/gift_types/
    - assets/icons/ui/
    - assets/images/app/
    - assets/images/avatars/
    - assets/images/backgrounds/

    - assets/images/emojis/
    - assets/images/flags/
    - assets/images/games/

    - assets/images/onboarding/
    - assets/images/placeholders/
    - assets/images/rooms/
    - assets/sounds/
    - assets/svgs/emojis/
    - assets/svgs/games/
    - assets/svgs/icons/
    - assets/svgs/illustrations/
    - assets/svgs/logos/
    - assets/svgs/navigation/
    - assets/svgs/social/
    - assets/svgs/ui/
    - assets/svgs/wallet/
    - .env

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
  # Fonts
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Thin.ttf
          weight: 100
        - asset: assets/fonts/Poppins-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Poppins-Black.ttf
          weight: 900

    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Italic.ttf
          style: italic

    - family: Bangla
      fonts:
        - asset: assets/fonts/NotoSansBengali-Regular.ttf
        - asset: assets/fonts/NotoSansBengali-Bold.ttf
          weight: 700

    - family: Hindi
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Regular.ttf
        - asset: assets/fonts/NotoSansDevanagari-Bold.ttf
          weight: 700