<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="LotChat - Connect, Chat, and Play">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="LotChat">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>LotChat</title>
  <link rel="manifest" href="manifest.json">

  <!-- Agora SDK for WebRTC calls -->
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.19.0.js"></script>

  <!-- Supabase Realtime -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/realtime-js@2.0.0/dist/umd/index.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #121212;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .loader {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      color: white;
      font-size: 18px;
      margin-top: 10px;
    }

    .error-message {
      color: #ff6b6b;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
      display: none;
      max-width: 80%;
      text-align: center;
      font-size: 14px;
    }

    .retry-button {
      background: white;
      color: #764ba2;
      border: none;
      padding: 10px 30px;
      border-radius: 5px;
      margin-top: 20px;
      cursor: pointer;
      font-weight: bold;
      display: none;
      font-size: 16px;
    }

    .retry-button:hover {
      background: #f0f0f0;
    }

    .debug-info {
      position: fixed;
      bottom: 10px;
      left: 10px;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      display: none;
    }
  </style>
</head>
<body>
<div id="loading">
  <div class="loader"></div>
  <div class="loading-text">Loading LotChat...</div>
  <div id="error" class="error-message"></div>
  <button id="retryButton" class="retry-button" onclick="window.location.reload()">Retry</button>
  <div id="debug" class="debug-info"></div>
</div>

<script>
  // ==================== ENHANCED WEBSOCKET ERROR HANDLING ====================

  (function() {
    "use strict";

    // Debug function
    window.debug = function(message) {
      console.log('[DEBUG]', message);
      const debugEl = document.getElementById('debug');
      if (debugEl) {
        debugEl.style.display = 'block';
        debugEl.innerHTML = String(message).replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }
    };

    // Show error function
    window.showError = function(message) {
      console.error('[ERROR]', message);
      const errorEl = document.getElementById('error');
      const retryEl = document.getElementById('retryButton');
      if (errorEl) {
        errorEl.style.display = 'block';
        errorEl.innerHTML = String(message).replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }
      if (retryEl) {
        retryEl.style.display = 'block';
      }
    };

    // Handle global errors
    window.addEventListener('error', function(e) {
      console.error('Global error:', e.error || e.message);
      showError('Error: ' + (e.message || 'Unknown error'));
    });

    window.addEventListener('unhandledrejection', function(e) {
      console.error('Unhandled rejection:', e.reason);
      showError('Promise Error: ' + (e.reason || 'Unknown'));
    });

    // ==================== ADVANCED WEBSOCKET HANDLER ====================

    // Configuration
    const WS_CONFIG = {
      maxRetries: 5,
      retryDelay: 2000,
      maxRetryDelay: 30000,
      timeout: 10000
    };

    // WebSocket connection manager
    class WebSocketManager {
      constructor() {
        this.connections = new Map();
        this.retryCounts = new Map();
      }

      createWebSocket(url, protocols) {
        const connectionId = url + (protocols || '');

        // Get retry count for this URL
        let retryCount = this.retryCounts.get(connectionId) || 0;

        debug(`WebSocket connecting to: ${url} (attempt ${retryCount + 1}/${WS_CONFIG.maxRetries})`);

        try {
          const ws = new originalWebSocket(url, protocols);

          // Set timeout
          const timeoutId = setTimeout(() => {
            if (ws.readyState !== WebSocket.OPEN) {
              debug(`WebSocket timeout for: ${url}`);
              ws.close();
            }
          }, WS_CONFIG.timeout);

          ws.addEventListener('open', () => {
            clearTimeout(timeoutId);
            console.log('✅ WebSocket connected:', url);
            debug('✅ WebSocket connected');

            // Reset retry count on successful connection
            this.retryCounts.set(connectionId, 0);
          });

          ws.addEventListener('close', (e) => {
            clearTimeout(timeoutId);
            console.log('WebSocket closed:', url, 'Code:', e.code, 'Reason:', e.reason);
            debug(`WebSocket closed: ${url} (code: ${e.code})`);

            // Attempt reconnection for certain close codes
            if (this.shouldReconnect(e.code)) {
              this.handleReconnection(url, protocols, connectionId);
            }
          });

          ws.addEventListener('error', (e) => {
            clearTimeout(timeoutId);
            console.warn('WebSocket error:', url);
            debug(`❌ WebSocket error: ${url}`);
          });

          // Store connection
          this.connections.set(connectionId, ws);

          return ws;
        } catch (e) {
          console.error('Failed to create WebSocket:', e);
          debug('❌ WebSocket creation failed: ' + e.message);

          // Return mock WebSocket
          return this.createMockWebSocket();
        }
      }

      shouldReconnect(closeCode) {
        // Don't reconnect on normal closure (1000)
        if (closeCode === 1000) return false;

        // Reconnect on abnormal closures
        const reconnectCodes = [1006, 1011, 1012, 1013, 1014];
        return reconnectCodes.includes(closeCode);
      }

      handleReconnection(url, protocols, connectionId) {
        let retryCount = this.retryCounts.get(connectionId) || 0;

        if (retryCount < WS_CONFIG.maxRetries) {
          retryCount++;
          this.retryCounts.set(connectionId, retryCount);

          const delay = Math.min(
            WS_CONFIG.retryDelay * Math.pow(2, retryCount - 1),
            WS_CONFIG.maxRetryDelay
          );

          debug(`🔄 Reconnecting in ${delay}ms (attempt ${retryCount}/${WS_CONFIG.maxRetries})`);

          setTimeout(() => {
            debug(`🔄 Attempting reconnection for: ${url}`);
            this.createWebSocket(url, protocols);
          }, delay);
        } else {
          debug(`❌ Max retries (${WS_CONFIG.maxRetries}) reached for: ${url}`);
          showError('Connection failed. Please check your internet and refresh.');
        }
      }

      createMockWebSocket() {
        return {
          send: function() {},
          close: function() {},
          addEventListener: function() {},
          removeEventListener: function() {},
          readyState: 3 // CLOSED
        };
      }
    }

    // Save original WebSocket
    const originalWebSocket = window.WebSocket;

    // Create WebSocket manager instance
    const wsManager = new WebSocketManager();

    // Override WebSocket
    window.WebSocket = function(url, protocols) {
      return wsManager.createWebSocket(url, protocols);
    };

    // Preserve WebSocket constants
    window.WebSocket.CONNECTING = 0;
    window.WebSocket.OPEN = 1;
    window.WebSocket.CLOSING = 2;
    window.WebSocket.CLOSED = 3;

    // ==================== NETWORK STATUS MONITOR ====================

    window.addEventListener('online', function() {
      debug('🌐 Network is online');
      // Attempt to reconnect any pending connections
      showError('Network connected. Retrying...');
      setTimeout(() => window.location.reload(), 2000);
    });

    window.addEventListener('offline', function() {
      debug('🌐 Network is offline');
      showError('Network disconnected. Please check your internet connection.');
    });

    // ==================== AGORA SDK CHECK ====================

    window.addEventListener('load', function() {
      debug('Window loaded');

      // Check Agora
      if (typeof AgoraRTC === 'undefined') {
        console.warn('Agora SDK not loaded');
        debug('⚠️ Agora SDK not loaded');
      } else {
        console.log('✅ Agora SDK loaded successfully');
        debug('✅ Agora SDK loaded');

        // Configure Agora for better WebSocket handling
        if (AgoraRTC.setLogLevel) {
          AgoraRTC.setLogLevel(2); // Warning level
        }
      }

      // Check Supabase Realtime
      if (typeof SupabaseRealtime === 'undefined') {
        console.warn('Supabase Realtime not loaded');
        debug('⚠️ Supabase Realtime not loaded');
      } else {
        console.log('✅ Supabase Realtime loaded');
        debug('✅ Supabase Realtime loaded');
      }

      // Set timeout for Flutter initialization
      const flutterTimeout = setTimeout(() => {
        console.warn('Flutter initialization timeout');
        showError('App is taking too long to load. Please check your internet connection and refresh.');
      }, 15000); // 15 seconds

      // Hide loading when Flutter is ready
      window.addEventListener('flutter-first-frame', function() {
        clearTimeout(flutterTimeout);
        console.log('✅ Flutter first frame rendered');
        document.getElementById('loading').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('loading').style.display = 'none';
        }, 500);
      });
    });

    // ==================== PERIODIC CONNECTION CHECK ====================

    setInterval(function() {
      if (navigator.onLine) {
        // Optional: Ping WebSocket connections
        debug('Connection check: online');
      }
    }, 30000); // Check every 30 seconds

  })();
</script>

<!-- The Flutter library and app entry point -->
<script src="flutter.js" defer></script>

<script>
  window.addEventListener('load', function() {
    const loading = document.getElementById('loading');

    // Fallback: hide loading after 15 seconds (if Flutter doesn't load)
    setTimeout(function() {
      if (loading && loading.style.display !== 'none') {
        loading.style.opacity = '0';
        setTimeout(() => {
          if (loading) loading.style.display = 'none';
        }, 500);
      }
    }, 15000);

    // Start Flutter app WITHOUT service worker
    if (typeof _flutter !== 'undefined' && _flutter.loader) {
      _flutter.loader.loadEntrypoint({
        onEntrypointLoaded: function(engineInitializer) {
          window.debug('Flutter engine initializer loaded');
          engineInitializer.initializeEngine().then(function(appRunner) {
            window.debug('Flutter engine initialized');
            appRunner.runApp();
          }).catch(function(error) {
            console.error('Failed to initialize engine:', error);
            window.showError('Failed to initialize app: ' + (error.message || 'Unknown error'));
          });
        }
      }).catch(function(error) {
        console.error('Failed to load entrypoint:', error);
        window.showError('Failed to load app: ' + (error.message || 'Unknown error'));
      });
    } else {
      console.error('Flutter loader not found');
      window.showError('Flutter loader not found. Please check your build.');
    }
  });
</script>
</body>
</html>
